<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<script src="js/libs/CSInterface.js"></script>
	<script src="js/main.js"></script>
	<script src="js/bootstrap.js"></script>

	<link rel="stylesheet" type="text/css" href="css/app.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap-responsive.min.css">
	<script src="https://kit.fontawesome.com/11a09ce743.js" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="css/styles.css" />

	<title>Refresh Batch</title>


</head>

<body scroll="no">
	<header class="header">
		<div class="header-left">
			<div class="header-logo">
				<li class="fa fa-sun"></li>
			</div>
			<div class="header-title">
				<p>reFresh Batch</p>
			</div>
		</div>
		<div class="header-right">
			<li onclick="window.location.reload();" class="icon fa fa-refresh"></li>
			<li onclick="closepanel()" class="icon fa fa-window-close"></li>
		</div>
	</header>

	<div class="panel">
		<button onclick="createFolder()" class="buttonyellow">Fresh Batch Setup</button>
		<button onclick="dataSetupShowHide()" class="buttonyellow">Data Setup</button>
	</div>
	<div class="panel-container" id="importPanel" hidden>
		<div class="element">
			<h4>Data Import Options</h4>
			<button onclick="importDataFileJS()" class="buttonyellow button-adj">
				<li class="icon fa-solid fa-file-csv"></li>
			</button>
			<button onclick="importDataFile()" class="buttonyellow button-adj">
				<li class="icon fa-brands fa-google-drive"></li>
			</button>
		</div>
	</div>
	<div class="panel" id="gDriveSetupPanel" hidden>
		<p>Data Fields </p>
		<div class="data-row">
			<p>Sheet ID:</p>
			<input type="text" id="sheetId" class="inputWide" name="sheet-id" placeholder="Sheet ID"
				value="117j4CuNgqx4KN0u7LlpnQ0gyYswU-2yhH2RL6othN3Q">
		</div>
		<div class="data-row">
			<p>Sheet Name:</p>
			<input type="text" id="sheetName" class="inputWide" name="sheet-name" placeholder="Sheet Name"
				value="Sheet1">
		</div>
		<button onclick="importsheetdata()" class="buttonyellow">Import gSheet Data</button>
	</div>
	<div class="panel-container panel-setup">
		<h4 class="panel-row-element">Data Row:</h4>
		<div class="panel-row">
			<input type="text" id="data-row-value" class="data-row-value" value="#" disabled>
			<div onclick="incrementSelectorJS()" class="icon buttonblue button-adj">
				<li class="fa-solid  fa-plus"></li>
			</div>
			<div onclick="decrementSelectorJS()" class="icon buttonblue button-adj">
				<li class="fa-solid fa-minus"></li>
			</div>
		</div>
	</div>
	<div class="panel" id="dataFieldPanel">
		<label class="panel-row-element">Data Field Options:</label>
		<div class="panel-row">

			<select onchange="selectChange()" name="dropdown-name" id="dropdown-name">
				<option>Select a Data Field</option>
			</select>
			<div class="icon">
				<li onclick="populateDataFieldDropdown()" class="fa fa-refresh"></li>
			</div>
		</div>
	</div>
	<div class="panel" id="dataFieldPanel">
		<label class="panel-row-element">Image Replace Selection:</label>
		<button onclick="addReplaceImageOption()" class="buttonblue button-adj">ADD GFX</button>
		<div class="panel-row" id="imageReplacePanel">
			<div id="selectContainer">
				<select id="imageReplaceList">
					<option value="volvo">Volvo</option>
				</select>
			</div>
		</div>
	</div>

	<div class="panel-container">
		<div class="panel-row">
			<button onclick="replaceimageJS()" class="buttonblue button-adj">Logo</button>
			<button onclick="addExpression()" class="buttonblue button-adj">Add</button>
			<button onclick="addTextJS()" class="buttonblue button-adj">ADD Text</button>
			<button onclick="addtoRenderQueueJS()" class="buttonblue button-adj">Render</button>
			<button onclick="dataArrayCSVJS()" class="buttonblue button-adj">Shape</button>
			<button onclick="batchRenderQueueJS()" class="buttonblue button-adj">Batch Render</button>


		</div>
	</div>
	</div>
	<div class="panel-container">
		<table id="dataTable" class="custom-table">
			<thead>
				<tr>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<!-- Table rows will be dynamically populated -->
			</tbody>
		</table>
	</div>
	<div class="panel-container">
		<p id="mySheetResults">This is a paragraph.</p>
		<div class="alert">
			<button type="button" class="close" data-dismiss="alert">&times;</button>
			<strong>Warning!</strong> Best check yo self, you're not looking too good.
		</div>
	</div>
	<div class="panel-container">
		<p id="myError">This is a paragraph.</p>
	</div>


	</div>


</body>

</html>
